name: OneGodian API CI

on:
  pull_request:
  push:
    branches:
      - main
      - upgrade/**

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: npm run check

      - name: Test
        run: npm test
